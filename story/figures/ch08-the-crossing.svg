<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" role="img" aria-label="A discovered notebook in a transformer and a declared state in a recurrent world model die identically under the freeze; inset: K* triples while lambda stays flat">
  <!-- paper card -->
  <rect x="1" y="1" width="758" height="398" rx="10" fill="#FBF8F1" stroke="#D8D2C4" stroke-width="1.5"/>

  <!-- left machine: transformer, discovered -->
  <g>
    <rect x="55" y="50" width="270" height="150" rx="8" fill="#FFFFFF" stroke="#D8D2C4" stroke-width="1.5"/>
    <text x="190" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" fill="#3A3630">the transformer</text>
    <text x="190" y="97" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#8A8272">notebook DISCOVERED — found by probe</text>
    <!-- small notebook, hand-drawn wavy lines -->
    <rect x="140" y="110" width="100" height="60" rx="5" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2"/>
    <g stroke="#4A6FA5" stroke-width="1.8" stroke-linecap="round" fill="none">
      <path d="M 152 126 q 16 -8 32 0 q 16 8 32 0"/>
      <path d="M 152 144 q 20 6 38 -2 q 18 -6 34 2"/>
      <path d="M 152 160 q 14 -7 30 0 q 18 8 34 -1"/>
    </g>
    <text x="190" y="190" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#4A6FA5">grown by training</text>
  </g>

  <!-- right machine: RSSM, declared -->
  <g>
    <rect x="435" y="50" width="270" height="150" rx="8" fill="#FFFFFF" stroke="#D8D2C4" stroke-width="1.5"/>
    <text x="570" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" fill="#3A3630">the recurrent world model</text>
    <text x="570" y="97" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#8A8272">state DECLARED — on the blueprint</text>
    <!-- declared z: a labeled box with straight ruled lines -->
    <rect x="520" y="110" width="100" height="60" rx="5" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2" stroke-dasharray="none"/>
    <g stroke="#4A6FA5" stroke-width="1.8" stroke-linecap="round">
      <line x1="532" y1="126" x2="608" y2="126"/>
      <line x1="532" y1="144" x2="608" y2="144"/>
      <line x1="532" y1="160" x2="608" y2="160"/>
    </g>
    <text x="570" y="190" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#4A6FA5">decreed by the architect — z</text>
  </g>

  <!-- center: one gesture -->
  <g>
    <text x="380" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#3A3630">one gesture</text>
    <text x="380" y="125" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#3A3630">freeze</text>
    <path d="M 350 135 L 330 150 M 410 135 L 430 150" stroke="#3A3630" stroke-width="1.8" fill="none"/>
    <text x="380" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#A65A4A">one signature</text>
    <text x="380" y="191" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#A65A4A">capability ≈ 0, witnesses agree</text>
  </g>

  <!-- inset: the coda -->
  <g>
    <rect x="150" y="230" width="460" height="120" rx="8" fill="#FFFFFF" stroke="#D8D2C4" stroke-width="1.5"/>
    <text x="380" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="13.5" fill="#3A3630">the coda — inside the world model, as k rises :</text>
    <!-- K* rising -->
    <g stroke="#4A6FA5" stroke-width="2.2" fill="none"><path d="M 200 330 L 340 275"/></g>
    <g fill="#4A6FA5">
      <circle cx="200" cy="330" r="4"/><circle cx="235" cy="317" r="4"/><circle cx="270" cy="303" r="4"/><circle cx="305" cy="289" r="4"/><circle cx="340" cy="275" r="4"/>
    </g>
    <text x="270" y="345" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#4A6FA5">K* : 5 → 18 (×3.6)</text>
    <!-- lambda flat -->
    <g stroke="#A65A4A" stroke-width="2.2" fill="none"><path d="M 430 300 L 570 298"/></g>
    <g fill="#A65A4A">
      <circle cx="430" cy="302" r="4"/><circle cx="465" cy="299" r="4"/><circle cx="500" cy="299" r="4"/><circle cx="535" cy="298" r="4"/><circle cx="570" cy="298" r="4"/>
    </g>
    <text x="500" y="345" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#A65A4A">λ̂ : flat (~0.5)</text>
  </g>

  <!-- caption -->
  <text x="380" y="382" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3A3630">The category "notebook" is real — and the landscape's complexity does not read its size.</text>
</svg>
