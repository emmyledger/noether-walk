<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" role="img" aria-label="The freeze: the same page live and frozen — same ink, zero information">
  <!-- paper card -->
  <rect x="1" y="1" width="758" height="328" rx="10" fill="#FBF8F1" stroke="#D8D2C4" stroke-width="1.5"/>

  <!-- live page -->
  <g>
    <rect x="75" y="60" width="230" height="180" rx="6" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2.2"/>
    <line x1="105" y1="60" x2="105" y2="240" stroke="#C9D4E4" stroke-width="1.5"/>
    <g stroke="#4A6FA5" stroke-width="2.4" stroke-linecap="round" fill="none">
      <path d="M 122 96  q 18 -14 36 0 q 18 14 36 0 q 18 -14 36 0 q 16 12 32 2"/>
      <path d="M 122 138 q 22 10 44 -2 q 22 -12 44 2 q 20 12 40 -3 q 16 -10 30 3"/>
      <path d="M 122 180 q 16 -18 32 -2 q 16 16 32 0 q 16 -16 32 -2 q 20 14 44 -1"/>
      <path d="M 122 216 q 26 8 52 0 q 26 -8 52 0 q 22 6 36 -4"/>
    </g>
  </g>
  <text x="190" y="268" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#4A6FA5">live — the notes say things</text>

  <!-- gesture arrow -->
  <path d="M 330 150 L 415 150" fill="none" stroke="#3A3630" stroke-width="2" stroke-linecap="round"/>
  <path d="M 415 150 l -13 -6 m 13 6 l -13 6" fill="none" stroke="#3A3630" stroke-width="2" stroke-linecap="round"/>
  <text x="372" y="132" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#3A3630">freeze</text>

  <!-- frozen page -->
  <g>
    <rect x="450" y="60" width="230" height="180" rx="6" fill="#FFFFFF" stroke="#9AA0A6" stroke-width="2.2"/>
    <line x1="480" y1="60" x2="480" y2="240" stroke="#DDDFE2" stroke-width="1.5"/>
    <g stroke="#9AA0A6" stroke-width="2.4" stroke-linecap="round" fill="none">
      <line x1="497" y1="96"  x2="662" y2="96"/>
      <line x1="497" y1="138" x2="662" y2="138"/>
      <line x1="497" y1="180" x2="662" y2="180"/>
      <line x1="497" y1="216" x2="662" y2="216"/>
    </g>
  </g>
  <text x="565" y="268" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#6E6758">frozen — the average scribble</text>

  <!-- caption -->
  <text x="380" y="302" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#3A3630">Same amount of ink. Zero information. Everything else keeps running.</text>
</svg>
