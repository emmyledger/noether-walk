<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-label="Attention learns hierarchical and local grammars equally fast; a state bottleneck pays a 3x toll on hierarchy; and cost-to-target has a floor at K*">
  <!-- paper card -->
  <rect x="1" y="1" width="758" height="358" rx="10" fill="#FBF8F1" stroke="#D8D2C4" stroke-width="1.5"/>

  <!-- LEFT: the race -->
  <text x="215" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" fill="#3A3630">the race — time to learn the grammar</text>
  <g stroke="#B8B2A4" stroke-width="1.2" fill="none">
    <path d="M 60 260 L 380 260"/>
    <path d="M 60 260 L 60 70"/>
  </g>
  <text x="220" y="286" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#6E6758">training steps</text>
  <text x="34" y="165" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#6E6758" transform="rotate(-90 34 165)">accuracy</text>

  <!-- attention: both grammars, fast (overlapping sigmoids) -->
  <g fill="none" stroke-linecap="round">
    <path d="M 62 256 C 85 250, 95 120, 120 92 C 132 80, 160 76, 375 75" stroke="#4A6FA5" stroke-width="2.4"/>
    <path d="M 62 256 C 90 252, 102 125, 128 95 C 140 83, 165 78, 375 78" stroke="#4A6FA5" stroke-width="2.4" stroke-dasharray="6 4"/>
  </g>
  <text x="150" y="62" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#4A6FA5">attention : hierarchical = local (both stroll)</text>

  <!-- RSSM local: mid -->
  <path d="M 62 256 C 120 252, 150 140, 185 100 C 200 84, 230 79, 375 78" stroke="#7A9A5A" stroke-width="2.4" fill="none"/>
  <text x="205" y="130" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7A9A5A">bottleneck, local</text>

  <!-- RSSM hierarchical: late (~3x) -->
  <path d="M 62 256 C 180 252, 260 246, 300 180 C 325 138, 345 95, 372 85" stroke="#A65A4A" stroke-width="2.4" fill="none"/>
  <text x="268" y="228" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#A65A4A">bottleneck, hierarchical — ~3× the toll</text>
  <!-- toll bracket -->
  <g stroke="#8A8272" stroke-width="1" fill="none">
    <path d="M 185 305 L 185 297 L 300 297 L 300 305"/>
  </g>
  <text x="242" y="320" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11.5" fill="#8A8272">4,500 → 13,500 steps (a toll, not a wall)</text>

  <!-- RIGHT: the floor -->
  <text x="575" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" fill="#3A3630">the floor — cost to target vs latent size</text>
  <g stroke="#B8B2A4" stroke-width="1.2" fill="none">
    <path d="M 440 260 L 720 260"/>
    <path d="M 440 260 L 440 70"/>
  </g>
  <text x="580" y="286" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#6E6758">designed latent size d_z</text>

  <!-- never-reaches marks below K* -->
  <g stroke="#A65A4A" stroke-width="2.2" stroke-linecap="round">
    <path d="M 462 100 l 12 12 m 0 -12 l -12 12"/>
    <path d="M 492 100 l 12 12 m 0 -12 l -12 12"/>
  </g>
  <text x="484" y="88" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11.5" fill="#A65A4A">below K* : never</text>

  <!-- K* floor line -->
  <line x1="528" y1="70" x2="528" y2="260" stroke="#4A6FA5" stroke-width="1.4" stroke-dasharray="5 5"/>
  <text x="528" y="278" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#4A6FA5">K*</text>

  <!-- cost curve: high just above the floor, trough near 1.4 K*, rising when oversized -->
  <path d="M 532 105 C 548 160, 560 192, 578 198 C 615 208, 668 172, 705 122" stroke="#3A3630" stroke-width="2.4" fill="none"/>
  <circle cx="578" cy="198" r="5" fill="#4A6FA5"/>
  <text x="578" y="225" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11.5" fill="#4A6FA5">trough ≈ 1.4×K*</text>
  <text x="655" y="105" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11.5" fill="#8A8272">oversized : 3–8× wasted</text>

  <!-- caption -->
  <text x="380" y="345" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3A3630">Structure costs time, not possibility — and only where state is a bottleneck. Measure the notebook, then size the container.</text>
</svg>
