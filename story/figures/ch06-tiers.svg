<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-label="K* clusters in architecture tiers (4, 16, 32) and does not move with model size">
  <!-- paper card -->
  <rect x="1" y="1" width="758" height="358" rx="10" fill="#FBF8F1" stroke="#D8D2C4" stroke-width="1.5"/>

  <text x="380" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#3A3630">the notebook's dimension, family by family (same task, same validated ruler)</text>

  <!-- axes -->
  <g stroke="#B8B2A4" stroke-width="1.2" fill="none">
    <path d="M 90 300 L 700 300"/>
    <path d="M 90 300 L 90 70"/>
  </g>
  <text x="395" y="330" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#6E6758">model size (0.07B → 3B, not to scale)</text>
  <text x="46" y="185" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#6E6758" transform="rotate(-90 46 185)">K*</text>

  <!-- tier lines: K*=32 at y=100, K*=16 at y=180, K*=4 at y=270 -->
  <g stroke="#D8D2C4" stroke-width="1.2" stroke-dasharray="6 6">
    <line x1="90" y1="100" x2="700" y2="100"/>
    <line x1="90" y1="180" x2="700" y2="180"/>
    <line x1="90" y1="270" x2="700" y2="270"/>
  </g>
  <g font-family="Georgia, serif" font-size="12.5" fill="#8A8272">
    <text x="708" y="104">32</text>
    <text x="708" y="184">16</text>
    <text x="708" y="274">4</text>
  </g>

  <!-- gpt2 family (learned positions): small, medium at 32 -->
  <g fill="#3A3630">
    <circle cx="130" cy="100" r="6"/>
    <circle cx="170" cy="100" r="6"/>
  </g>
  <text x="150" y="80" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#3A3630">GPT-2 s, m</text>

  <!-- pythia family: 160m at 16, 410m+ at 32 -->
  <g fill="#4A6FA5">
    <circle cx="240" cy="180" r="6"/>
    <circle cx="300" cy="100" r="6"/>
    <circle cx="350" cy="100" r="6"/>
  </g>
  <path d="M 246 174 C 262 140, 278 115, 294 106" stroke="#4A6FA5" stroke-width="1.4" fill="none" stroke-dasharray="3 4"/>
  <text x="240" y="205" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#4A6FA5">Pythia 160M</text>
  <text x="370" y="80" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#4A6FA5">Pythia 410M+ (one step, then flat)</text>

  <!-- qwen family: 0.5, 1.5, 3B flat at 16 -->
  <g fill="#7A9A5A">
    <circle cx="420" cy="180" r="6"/>
    <circle cx="510" cy="180" r="6"/>
    <circle cx="600" cy="180" r="6"/>
  </g>
  <line x1="420" y1="180" x2="600" y2="180" stroke="#7A9A5A" stroke-width="1.4" stroke-dasharray="3 4"/>
  <text x="510" y="162" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#7A9A5A">Qwen2.5 — 0.5B, 1.5B, 3B : flat across 6× the size</text>

  <!-- olmo: 1B at 4 -->
  <circle cx="480" cy="270" r="6" fill="#A65A4A"/>
  <text x="480" y="250" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12.5" fill="#A65A4A">OLMo-2 1B — the breaker</text>

  <!-- caption -->
  <text x="380" y="348" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3A3630">Tiers, not a constant — and not capability either. The cause is open (chapter 10's first invitation).</text>
</svg>
