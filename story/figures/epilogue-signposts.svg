<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" role="img" aria-label="Five signposts hammered in after publication — three corrections, one verdict that held, one coefficient derived — and at the end of the trail, the target never hit: the invariant, waiting for your shot">
  <!-- paper card -->
  <rect x="1" y="1" width="758" height="338" rx="10" fill="#FBF8F1" stroke="#D8D2C4" stroke-width="1.5"/>

  <text x="380" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#3A3630">signposts, hammered in after publication — and the target still standing</text>

  <!-- the trail -->
  <path d="M 20 302 C 190 284, 380 300, 730 262" fill="none" stroke="#8A8272" stroke-width="2" stroke-dasharray="7 6" stroke-linecap="round"/>

  <!-- post 1: slope corrected -->
  <g>
    <line x1="70" y1="294" x2="70" y2="128" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="8" y="96" width="124" height="54" rx="5" fill="#FFFFFF" stroke="#A65A4A" stroke-width="2" transform="rotate(-3 70 123)"/>
    <text x="70" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A65A4A" transform="rotate(-3 70 123)">2k/3 → k/2</text>
    <text x="70" y="131" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(-3 70 123)">proof : 8 values of k,</text>
    <text x="70" y="143" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(-3 70 123)">k/2 fits 6× better</text>
  </g>

  <!-- post 2: ruler blind -->
  <g>
    <line x1="195" y1="296" x2="195" y2="158" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="133" y="126" width="124" height="54" rx="5" fill="#FFFFFF" stroke="#A65A4A" stroke-width="2" transform="rotate(2 195 153)"/>
    <text x="195" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A65A4A" transform="rotate(2 195 153)">the ruler is blind</text>
    <text x="195" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A65A4A" transform="rotate(2 195 153)">to structure</text>
    <text x="195" y="172" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(2 195 153)">proof : K* = 1 = 1, 3 seeds</text>
  </g>

  <!-- post 3: right-sizing -->
  <g>
    <line x1="320" y1="298" x2="320" y2="122" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="258" y="90" width="124" height="54" rx="5" fill="#FFFFFF" stroke="#A65A4A" stroke-width="2" transform="rotate(-2 320 117)"/>
    <text x="320" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A65A4A" transform="rotate(-2 320 117)">fine right-sizing</text>
    <text x="320" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A65A4A" transform="rotate(-2 320 117)">doesn't pay</text>
    <text x="320" y="136" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(-2 320 117)">proof : 1.34× vs fair default</text>
  </g>

  <!-- post 4: held -->
  <g>
    <line x1="445" y1="294" x2="445" y2="160" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="383" y="128" width="124" height="54" rx="5" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2" transform="rotate(3 445 155)"/>
    <text x="445" y="147" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#4A6FA5" transform="rotate(3 445 155)">λ̂ ≠ K* : HELD</text>
    <text x="445" y="161" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(3 445 155)">3 seeds, 2 machines,</text>
    <text x="445" y="173" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(3 445 155)">all four verdicts</text>
  </g>

  <!-- post 5: derived -->
  <g>
    <line x1="570" y1="290" x2="570" y2="118" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="506" y="80" width="128" height="64" rx="5" fill="#FFFFFF" stroke="#7A9A5A" stroke-width="2.4" transform="rotate(-2 570 112)"/>
    <text x="570" y="99" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7A9A5A" transform="rotate(-2 570 112)">K* ≈ b(|λ₂|)·k</text>
    <text x="570" y="113" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#7A9A5A" transform="rotate(-2 570 112)">the half : DERIVED</text>
    <text x="570" y="126" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(-2 570 112)">the slope follows the</text>
    <text x="570" y="138" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="10" fill="#6E6758" transform="rotate(-2 570 112)">world's spectral gap</text>
  </g>

  <!-- the TARGET at the end of the trail: the invariant, never hit -->
  <g>
    <line x1="692" y1="286" x2="692" y2="222" stroke="#8A7355" stroke-width="6" stroke-linecap="round"/>
    <circle cx="692" cy="120" r="46" fill="#FFFFFF" stroke="#3A3630" stroke-width="2"/>
    <circle cx="692" cy="120" r="34" fill="none" stroke="#A65A4A" stroke-width="2.2"/>
    <circle cx="692" cy="120" r="22" fill="none" stroke="#A65A4A" stroke-width="2.2"/>
    <circle cx="692" cy="120" r="10" fill="none" stroke="#A65A4A" stroke-width="2.2"/>
    <circle cx="692" cy="120" r="3.5" fill="#A65A4A"/>
    <text x="692" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#3A3630">the invariant</text>
    <text x="692" y="200" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758">never hit — not once</text>
    <text x="692" y="214" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#4A6FA5">your shot : FALSIFY.md</text>
  </g>

  <!-- probe note along the trail -->
  <text x="330" y="238" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11.5" fill="#8A8272">(and one plank left face-down : the tiers probe saturated — instrument, not verdict)</text>

  <!-- caption -->
  <text x="380" y="322" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13.5" fill="#3A3630">The walk keeps its signposts where it fell. The target at the end has never been hit — it is waiting for you.</text>
</svg>
