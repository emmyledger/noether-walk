<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" role="img" aria-label="Four signposts hammered in after publication: three corrections with their proofs, one verdict that held">
  <!-- paper card -->
  <rect x="1" y="1" width="758" height="338" rx="10" fill="#FBF8F1" stroke="#D8D2C4" stroke-width="1.5"/>

  <text x="380" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#3A3630">signposts, hammered in after publication</text>

  <!-- the trail -->
  <path d="M 40 300 C 200 280, 380 300, 720 270" fill="none" stroke="#8A8272" stroke-width="2" stroke-dasharray="7 6" stroke-linecap="round"/>

  <!-- post 1: slope -->
  <g>
    <line x1="120" y1="290" x2="120" y2="120" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="48" y="88" width="144" height="58" rx="5" fill="#FFFFFF" stroke="#A65A4A" stroke-width="2" transform="rotate(-3 120 117)"/>
    <text x="120" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A65A4A" transform="rotate(-3 120 117)">2k/3 → k/2</text>
    <text x="120" y="128" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758" transform="rotate(-3 120 117)">proof : 8 values of k,</text>
    <text x="120" y="141" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758" transform="rotate(-3 120 117)">k/2 fits 6× better</text>
  </g>

  <!-- post 2: ruler blind -->
  <g>
    <line x1="300" y1="295" x2="300" y2="150" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="228" y="118" width="144" height="58" rx="5" fill="#FFFFFF" stroke="#A65A4A" stroke-width="2" transform="rotate(2 300 147)"/>
    <text x="300" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A65A4A" transform="rotate(2 300 147)">the ruler is blind</text>
    <text x="300" y="157" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A65A4A" transform="rotate(2 300 147)">to structure</text>
    <text x="300" y="171" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758" transform="rotate(2 300 147)">proof : K* = 1 = 1, 3 seeds</text>
  </g>

  <!-- post 3: right-sizing -->
  <g>
    <line x1="480" y1="290" x2="480" y2="115" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="408" y="83" width="144" height="58" rx="5" fill="#FFFFFF" stroke="#A65A4A" stroke-width="2" transform="rotate(-2 480 112)"/>
    <text x="480" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A65A4A" transform="rotate(-2 480 112)">fine right-sizing</text>
    <text x="480" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A65A4A" transform="rotate(-2 480 112)">doesn't pay</text>
    <text x="480" y="136" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758" transform="rotate(-2 480 112)">proof : 1.34× vs a fair default</text>
  </g>

  <!-- post 4: held -->
  <g>
    <line x1="650" y1="285" x2="650" y2="150" stroke="#8A7355" stroke-width="5" stroke-linecap="round"/>
    <rect x="578" y="118" width="144" height="58" rx="5" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2" transform="rotate(3 650 147)"/>
    <text x="650" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#4A6FA5" transform="rotate(3 650 147)">λ̂ ≠ K* : HELD</text>
    <text x="650" y="157" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758" transform="rotate(3 650 147)">3 seeds, 2 machines,</text>
    <text x="650" y="170" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#6E6758" transform="rotate(3 650 147)">all four verdicts</text>
  </g>

  <!-- probe note along the trail -->
  <text x="380" y="245" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#8A8272">(and one plank left face-down : the tiers probe saturated — instrument, not verdict)</text>

  <!-- caption -->
  <text x="380" y="320" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3A3630">The walk keeps its signposts where it fell — so the next walker doesn't have to.</text>
</svg>
