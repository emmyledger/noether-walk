name: paper-pdf

on:
  push:
    branches: [main]
    paths: ["paper/**", ".github/workflows/paper.yml"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required by the release step on tag builds

jobs:
  build-pdf:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc + xelatex
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q pandoc texlive-xetex \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended fonts-dejavu lmodern

      - name: Build PDF
        run: |
          pandoc paper/draft.md paper/references.md \
            --defaults paper/pdf.yaml \
            -o freezing-the-notebook.pdf
          ls -la freezing-the-notebook.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freezing-the-notebook-pdf
          path: freezing-the-notebook.pdf

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: freezing-the-notebook.pdf
