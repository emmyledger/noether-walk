name: tier0

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-reproduce:
    runs-on: ubuntu-24.04  # pinned, not 'latest': the environment is part of the claim
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (CPU torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Environment fingerprint (shown in the run summary)
        run: |
          {
            echo "### Environment"
            lsb_release -d
            uname -mr
            python --version
            python -c "import torch, numpy; print('torch', torch.__version__, '| numpy', numpy.__version__)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Unit tests
        run: pytest -q

      - name: Tier 0 — installed arc (freeze at inference)
        run: python -m invariants.tier0 --arc installed --seeds 0 1 2

      - name: Independent verdict re-derivation
        run: python -m invariants.verdicts artifacts
